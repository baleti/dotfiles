set -g window-status-current-format ''
set -g status-left '#H'
set -g status-right ''

set -g mouse on

# enable OSC 52 passthrough so programs running inside panes (e.g. Emacs)
# can set the host clipboard over ssh
set -s set-clipboard on

# scrollback size
set -g history-limit 1000000

# set vi-style keybindings
setw -g mode-keys vi

# set new windows/panes to open in current dirrectory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

#remap scrolling mode (copy mode)
#https://unix.stackexchange.com/questions/450184/in-tmux-how-to-set-shortcut-for-copy-mode
bind-key -T prefix 'u' copy-mode
bind-key -T prefix 'C-u' copy-mode

# https://unix.stackexchange.com/questions/567958/how-to-switch-panes-in-tmux-and-then-begin-typing-immediately
# lets you type immediately after switching panes
bind-key -T prefix Right select-pane -R
bind-key -T prefix Left select-pane -L
bind-key -T prefix Up select-pane -U
bind-key -T prefix Down select-pane -D
bind-key -T prefix l select-pane -R
bind-key -T prefix h select-pane -L
bind-key -T prefix k select-pane -U
bind-key -T prefix j select-pane -D

# don't exit copy mode when yanking
bind-key -T copy-mode-vi y send -X copy-selection
bind-key -T copy-mode-vi Enter send -X copy-selection

# When killing session move to the next opened session
# https://unix.stackexchange.com/questions/58588/kill-a-tmux-session-and-select-another-tmux-session
bind-key x confirm-before -p "kill session #S? (y/n)" "run-shell 'tmux switch-client -n \\\; kill-session -t \"#S\"'"

#clear scrollback history shortcut
bind -n C-l clear-history \; run-shell 'sleep 0.1' \; send-keys C-l

# tmux-resurrect / tmux-continuum, installed without TPM
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '10'
# set -g @continuum-restore 'on'

# self-healing tmux-resurrect/tmux-continuum checkout, no TPM required:
# clone each plugin on first run, then refresh at most once every 30 days
# via a backgrounded git pull so tmux server startup never blocks on git
run-shell '\
  d=~/.config/tmux/plugins; \
  for r in tmux-resurrect tmux-continuum; do \
    e="${r#tmux-}.tmux"; \
    [ -f "$d/$r/$e" ] || git clone --quiet --depth 1 "https://github.com/tmux-plugins/$r" "$d/$r"; \
    f="$d/$r/.git/FETCH_HEAD"; \
    m=$(stat -c %Y "$f" 2>/dev/null || echo 0); \
    if [ $(( $(date +%s) - m )) -gt 2592000 ]; then touch "$f" 2>/dev/null; git -C "$d/$r" pull --quiet >/dev/null 2>&1 & fi; \
  done'
run '~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux'
run '~/.config/tmux/plugins/tmux-continuum/continuum.tmux'
